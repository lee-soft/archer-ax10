name: build-feed

# Aggregates each ax10-* package's own .ipk (published to its repo's "ipk" release) into
# the opkg feed the router consumes, and publishes it — plus the boot bootstrap assets —
# as a GitHub Release:
#   src/gz ax10 https://github.com/lee-soft/archer-ax10/releases/latest/download
#
# Trigger by pushing a version tag, e.g.  git tag v4 && git push origin v4
# (Make sure each package's build-ipk workflow has published its .ipk first.)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish the feed to'
        required: true
        default: 'feed-latest'

permissions:
  contents: write

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for opt.tar.gz + bootstrap)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Collect each package's .ipk from its repo's "ipk" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p feed
          for p in ax10-svc ax10-busybox ax10-dropbear ax10-wifi ax10-luci; do
            echo "== $p =="
            gh release download ipk --repo lee-soft/$p --pattern '*.ipk' --dir feed
          done
          ls -l feed

      - name: Build the Packages index
        run: sh index.sh feed

      - name: Assemble release assets (feed + boot bootstrap)
        run: |
          mkdir -p dist
          cp feed/*.ipk feed/Packages feed/Packages.gz dist/
          cp bootstrap/busybox-armv7l bootstrap/dropbear_vanilla dist/
          cp ax10-opkg/opt.tar.gz dist/
          cp boot.sh dist/
          ls -l dist

      - name: Publish feed release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes "ax10 opkg feed (aggregated per-package .ipks) + boot bootstrap assets" \
          || gh release upload "$TAG" dist/* --clobber
